# kafka-deployment.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mykafka
  namespace: mykafka
spec:
  serviceName: mykafka
  replicas: 3
  selector:
    matchLabels:
      app: mykafka
  template:
    metadata:
      labels:
        app: mykafka
    spec:
      containers:
      - name: mykafka
        image: confluentinc/cp-kafka:latest
        command:
        - sh
        - -c
        - |
          export KAFKA_NODE_ID=${POD_NAME##*-}
          echo "Kafka node id: $KAFKA_NODE_ID"
          /etc/confluent/docker/run
        ports:
          - containerPort: 9092
            name: broker
          - containerPort: 9093
            name: controller
        env:
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name   # StatefulSet pod name: mykafka-0, mykafka-1, mykafka-2
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@mykafka-0.mykafka.svc.cluster.local:9093,2@mykafka-1.mykafka.svc.cluster.local:9093,3@mykafka-2.mykafka.svc.cluster.local:9093"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_LISTENERS
          value: PLAINTEXT://:9092,CONTROLLER://:9093
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://$(POD_NAME).mykafka.mykafka.svc.cluster.local:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "yes"
        - name: KAFKA_PORT
          value: ""
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        volumeMounts:
          - name: mykafka-data
            mountPath: /var/lib/mykafka/data
  volumeClaimTemplates:
  - metadata:
      name: mykafka-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
